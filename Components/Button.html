<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Scripts | Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>

    <script src="../assets/highlight.min.js"></script>
    <script src="../assets/code_viewer.js"></script>

    <link rel="stylesheet" href="../assets/highlight_dark.min.css">
    <link rel="stylesheet" href="../assets/highlight_dark.css">

    <style>
        span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 600ms linear;
            background-color: rgba(255, 255, 255, 0.7);
        }
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    
    <div class="container p-3 m-auto">

        <div class="mb-10">
            <h3 class="mb-1">Chose theme color</h3>
            <div class="flex gap-5 ">
                <button data-type="blue" class="p-2 px-5 bg-blue-500 rounded text-white font-semibold bg_changer">Blue</button>
                <button data-type="green" class="p-2 px-5 bg-green-500 rounded text-white font-semibold bg_changer">Green</button>
                <button data-type="purple" class="p-2 px-5 bg-purple-500 rounded text-white font-semibold bg_changer">Purple</button>
                <button data-type="gray" class="p-2 px-5 bg-gray-500 rounded text-white font-semibold bg_changer">Gray</button>
                <button data-type="red" class="p-2 px-5 bg-red-500 rounded text-white font-semibold bg_changer">Red</button>
                <button data-type="orange" class="p-2 px-5 bg-orange-500 rounded text-white font-semibold bg_changer">Orange</button>
            </div>
        </div>

        <div class="flex gap-5 buttons">
            

            <button 
                class="rounded px-4 py-2 bg-blue-500 text-white font-semibold"
            >
                Button With Background
            </button>

            <button 
                class="rounded btn-ripple px-4 py-2 bg-blue-500 text-white font-semibold relative overflow-hidden"
            >
                Button With Ripple
            </button>

            <button 
                class="rounded px-4 py-2 bg-white border-blue-500 border text-blue-500 font-semibold relative overflow-hidden"
            >
                Button Outline
            </button>

        </div>
    </div>


    <div class="container m-auto mt-10">
        <pre class="highlight html">
            <code class="language-html rounded">
                <button class="rounded px-4 py-2 bg-blue-500 text-white font-semibold">
                    Button With Background
                </button>
            </code>
        </pre>
    </div>



    <script>



        var prev_type = "blue"
        $(".bg_changer").on("click", function() {
            
            $(".buttons button").removeClass(`bg-${prev_type}-500 text-${prev_type}-500 border-${prev_type}-500`)
            const new_type = $(this).attr('data-type')
            document.querySelectorAll("code").forEach(function(element) {
                element.innerHTML = element.innerHTML.replace(prev_type, new_type);
            });
            prev_type = new_type

            $(".buttons").find("button").each(function() {
                if($(this).hasClass("border")){
                    $(this).addClass(`text-${prev_type}-500`)
                    $(this).addClass(`border-${prev_type}-500`)
                }else {
                    $(this).addClass(`bg-${prev_type}-500`)
                }
            })


        })

        document.querySelectorAll("code").forEach(function(element) {
            element.innerHTML = element.innerHTML.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        });

        hljs.debugMode();
        hljs.highlightAll();

        function rippleEffect(event) {
            const btn = event.currentTarget;
        
            const circle = document.createElement("span");
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - (btn.offsetLeft + radius)}px`;
            circle.style.top = `${event.clientY - (btn.offsetTop + radius)}px`;
            circle.classList.add("ripple");

            const ripple = btn.getElementsByClassName("ripple")[0];

            if (ripple) {
                ripple.remove();
            }

            btn.appendChild(circle);
        }

        const btn = document.getElementsByClassName("btn-ripple");
        console.log(btn);
        if(btn){
            btn[0].addEventListener("click", rippleEffect);
        }
    </script>

</body>
</html>
