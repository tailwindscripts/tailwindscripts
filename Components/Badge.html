<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="container m-auto mt-4">

        <div class="mb-10">
            <h2 class="mb-2">Ractangle Badge</h2>

            <div class="flex gap-5">
                <div class="border border-gray-300 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="gray border badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-gray-700 mr-2"></div>
                        <span class="text-xs text-gray-700 font-normal">Badge</span>
                    </div>
                </div>
    
    
                <div class="bg-indigo-100 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="indigo background badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-indigo-700 mr-2"></div>
                        <span class="text-xs text-indigo-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-yellow-100 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="yellow background badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-yellow-700 mr-2"></div>
                        <span class="text-xs text-yellow-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-red-100 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="red background badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-red-700 mr-2"></div>
                        <span class="text-xs text-red-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-green-100 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="green background badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-green-700 mr-2"></div>
                        <span class="text-xs text-green-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-blue-100 h-8 w-24 mb-4 md:mb-0 rounded-md flex items-center justify-center">
                    <div tabindex="0" aria-label="blue background badge" class="focus:outline-none flex items-center">
                        <div class="h-2 w-2 rounded-full bg-blue-700 mr-2"></div>
                        <span class="text-xs text-blue-700 font-normal">Badge</span>
                    </div>
                </div>
    
            </div>
            
        </div>

        <div class="mb-10">
            <h2 class="mb-2">Rounded Badge</h2>

            <div class="flex gap-5">
                <div class="border border-gray-300 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="gray border badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-gray-700 font-normal">Badge</span>
                    </div>
                </div>
    
    
                <div class="bg-indigo-100 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="indigo background badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-indigo-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-yellow-100 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="yellow background badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-yellow-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-red-100 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="red background badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-red-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-green-100 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="green background badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-green-700 font-normal">Badge</span>
                    </div>
                </div>

                <div class="bg-blue-100 h-6 w-24 mb-4 md:mb-0 rounded-xl flex items-center justify-center">
                    <div tabindex="0" aria-label="blue background badge" class="focus:outline-none flex items-center">
                        <span class="text-xs text-blue-700 font-normal">Badge</span>
                    </div>
                </div>
    
            </div>
            
        </div>



        <div class="mb-10">
            <h2 class="mb-2">Pill Badge</h2>

            <div class="flex gap-5">
                <span class="bg-blue-100 text-blue-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Default</span>
                <span class="bg-gray-100 text-gray-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Dark</span>
                <span class="bg-red-100 text-red-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Red</span>
                <span class="bg-green-100 text-green-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Green</span>
                <span class="bg-yellow-100 text-yellow-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Yellow</span>
                <span class="bg-indigo-100 text-indigo-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Indigo</span>
                <span class="bg-purple-100 text-purple-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Purple</span>
                <span class="bg-pink-100 text-pink-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">Pink</span>
            </div>
            
        </div>


        <div class="mb-10">
            <h2 class="mb-2">Crossable Badge</h2>

            <div class="flex gap-5">
                
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-blue-800 bg-blue-100 rounded">
                    <span>Default</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-blue-400 bg-transparent rounded-sm hover:bg-blue-200 hover:text-blue-900">
                        <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                        </svg>
                        <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-gray-800 bg-gray-100 rounded">
                    <span>Dark</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-gray-400 bg-transparent rounded-sm hover:bg-gray-200">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-red-800 bg-red-100 rounded">
                    <span>Red</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-red-400 bg-transparent rounded-sm hover:bg-red-200 hover:text-red-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-green-800 bg-green-100 rounded">
                    <span>Green</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-green-400 bg-transparent rounded-sm hover:bg-green-200 hover:text-green-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-yellow-800 bg-yellow-100 rounded">
                    <span>Yellow</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-yellow-400 bg-transparent rounded-sm hover:bg-yellow-200 hover:text-yellow-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-indigo-800 bg-indigo-100 rounded">
                    <span>Indigo</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-indigo-400 bg-transparent rounded-sm hover:bg-indigo-200 hover:text-indigo-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-purple-800 bg-purple-100 rounded ">
                    <span>Purple</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-purple-400 bg-transparent rounded-sm hover:bg-purple-200 hover:text-purple-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
                <div class="inline-flex items-center px-2 py-1 mr-2 text-sm font-medium text-pink-800 bg-pink-100 rounded">
                    <span>Pink</span>
                    <button type="button" class="inline-flex items-center p-1 ml-2 text-sm text-pink-400 bg-transparent rounded-sm hover:bg-pink-200 hover:text-pink-900">
                    <svg class="w-2 h-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Remove badge</span>
                    </button>
                </div>
  
            </div>
            
        </div>

    </div>
    
</body>
</html>
